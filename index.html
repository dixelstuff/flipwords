<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FlipWords Wireframe</title>
  <style>
    :root {
      --bg: #f7f5fb;
      --ink: #272033;
      --muted: #766f82;
      --tile-bg: #ffffff;
      --tile-border: #d8d1e5;
      --tile-shadow: 0 8px 20px rgba(39, 32, 51, 0.10);
      --tile-shadow-lift: 0 14px 28px rgba(39, 32, 51, 0.18);
      --success: #30a46c;
      --reset-bg: #e9e3f4;
      --hint-bg: #f6edc8;
      --hint-border: #d4a72c;
      --hint-glow: rgba(212, 167, 44, 0.24);
    }

    * { box-sizing: border-box; }

    html {
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: manipulation;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    .game {
      width: min(94vw, 560px);
      height: 100vh;
      height: 100dvh;
      padding: 22px 18px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateY(-8vh);
      overflow: hidden;
      touch-action: manipulation;
    }

    .rotate-message {
      display: none;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 28px;
      place-items: center;
      text-align: center;
      background: var(--bg);
      color: var(--ink);
      font-size: 22px;
      font-weight: 750;
      line-height: 1.25;
    }

    .rotate-message span {
      display: block;
      max-width: 360px;
    }

    .title {
      margin: 0;
      font-size: clamp(38px, 6.4vw, 64px);
      letter-spacing: -0.045em;
      font-weight: 800;
    }

    .subtitle {
      margin: 10px auto 34px;
      max-width: 460px;
      padding: 0 14px;
      color: var(--muted);
      font-size: clamp(16px, 1.7vw, 19px);
      line-height: 1.38;
    }

    .board-shell {
      padding: 20px 14px 18px;
      border-radius: 24px;
    }

    .board {
      display: flex;
      justify-content: center;
      gap: 10px;
      min-height: 112px;
      touch-action: none;
    }

    .tile-wrap {
      width: clamp(54px, 12.5vw, 84px);
      height: clamp(100px, 21.5vw, 142px);
      cursor: grab;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      border-radius: 18px;
      box-shadow: var(--tile-shadow);
      transition: transform 150ms ease, opacity 150ms ease, box-shadow 180ms ease;
      transform: scale(1);
    }

    .tile-wrap:active { cursor: grabbing; }

    .tile-wrap.dragging {
      opacity: 0.14;
      transform: scale(0.94);
    }

    .tile-wrap.locked {
      cursor: default;
      box-shadow: 0 8px 20px rgba(39, 32, 51, 0.10), 0 0 0 3px var(--hint-glow);
    }

    .tile-wrap.locked .tile-face {
      border-color: var(--hint-border);
      background: #fffdf4;
    }

    .tile-wrap.solved-tile {
      box-shadow: 0 8px 20px rgba(48, 164, 108, 0.18), 0 0 0 3px rgba(48, 164, 108, 0.18);
    }

    .tile-wrap.solved-tile .tile-face {
      border-color: var(--success);
      background: #ffffff;
    }

    .tile-stage {
      width: 100%;
      height: 100%;
      perspective: 700px;
      border-radius: 18px;
    }

    .tile {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      border-radius: 18px;
      transition: transform 220ms cubic-bezier(.2,.8,.2,1);
      will-change: transform;
    }

    .tile-wrap.flipped .tile,
    .drag-proxy.flipped .tile { transform: rotateX(180.01deg); }

    .tile-face {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: 1fr 1px 1fr;
      align-items: center;
      background: var(--tile-bg);
      border: 1.5px solid var(--tile-border);
      border-radius: 18px;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0.2px);
      -webkit-transform: translateZ(0.2px);
      transition: border-color 180ms ease, background 180ms ease;
      will-change: transform, opacity;
    }

    .tile-face.back {
      transform: rotateX(180.01deg) translateZ(0.2px);
      -webkit-transform: rotateX(180.01deg) translateZ(0.2px);
    }

    .letter {
      display: grid;
      place-items: center;
      font-size: clamp(30px, 6.4vw, 50px);
      font-weight: 780;
      line-height: 1;
      text-transform: uppercase;
      opacity: 1;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--tile-border);
    }

    .tile-wrap.flip-feedback { animation: flip-lift 340ms ease-out; }
    .tile-wrap.flip-feedback .letter { animation: flip-letter-fade 340ms linear; }
    .tile-wrap.anim-flip-down .tile { animation: flip-down 340ms cubic-bezier(.18,.8,.22,1); }
    .tile-wrap.anim-flip-up .tile { animation: flip-up 340ms cubic-bezier(.18,.8,.22,1); }

    @keyframes flip-lift {
      0% { transform: scale(1); }
      35% { transform: scale(1.055); }
      100% { transform: scale(1); }
    }

    @keyframes flip-down {
      0% { transform: rotateX(0deg); }
      48% { transform: rotateX(88deg); }
      52% { transform: rotateX(92deg); }
      100% { transform: rotateX(180.01deg); }
    }

    @keyframes flip-up {
      0% { transform: rotateX(180deg); }
      48% { transform: rotateX(268deg); }
      52% { transform: rotateX(272deg); }
      100% { transform: rotateX(360.01deg); }
    }

    @keyframes flip-letter-fade {
      0% { opacity: 1; }
      32% { opacity: 1; }
      46% { opacity: 0; }
      54% { opacity: 0; }
      68% { opacity: 1; }
      100% { opacity: 1; }
    }

    .drag-proxy {
      position: fixed;
      z-index: 999;
      width: clamp(46px, 14vw, 64px);
      height: clamp(86px, 24vw, 108px);
      pointer-events: none;
      transform: translate(-50%, -50%) scale(1.05);
      opacity: 0.96;
      border-radius: 18px;
      box-shadow: var(--tile-shadow-lift);
    }

    .drag-proxy .tile-stage { perspective: 700px; }

    .feedback-area {
      height: 32px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      margin-top: 0;
      margin-bottom: 2px;
    }

    .controls {
      display: grid;
      grid-template-columns: 126px 126px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0;
      min-height: 44px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 999px;
      padding: 0 15px;
      width: 126px;
      height: 50px;
      line-height: 1;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      opacity: 0.46;
      cursor: default;
    }

    .start-words { color: var(--ink); background: var(--reset-bg); }

    .message.info {
      color: var(--muted);
      font-size: 19px;
      font-weight: 750;
      animation: info-fade 4000ms ease-out forwards;
    }

    @keyframes info-fade {
      0% { opacity: 0; transform: translateY(4px); }
      4% { opacity: 1; transform: translateY(0); }
      92% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(4px); }
    }

    .hint {
      color: #5c4700;
      background: #f4df8a;
      box-shadow: 0 2px 8px rgba(122, 93, 0, 0.08);
    }

    .hint:disabled { box-shadow: none; }

    .action-slot {
      position: relative;
      display: block;
      width: 126px;
      height: 50px;
      line-height: 0;
    }

    .action-slot button {
      position: absolute;
      inset: 0;
    }

    .next {
      visibility: hidden;
      color: white;
      background: var(--success);
      pointer-events: none;
    }

    .next.visible {
      visibility: visible;
      pointer-events: auto;
    }

    .hidden {
      visibility: hidden !important;
      pointer-events: none;
    }

    .message {
      min-height: 24px;
      margin-top: -2px;
      margin-bottom: 0;
      color: var(--success);
      font-weight: 800;
      font-size: 27px;
      opacity: 0;
      transform: translateY(0);
      pointer-events: none;
    }

    .message.score-pop { animation: score-pop 2000ms ease-out forwards; }
    .message.score-zero { color: var(--muted); }

    @keyframes score-pop {
      0% { opacity: 0; transform: translateY(8px) scale(0.96); }
      16% { opacity: 1; transform: translateY(0) scale(1.05); }
      66% { opacity: 1; transform: translateY(-8px) scale(1); }
      100% { opacity: 0; transform: translateY(-24px) scale(0.98); }
    }

    .status {
      margin-top: 28px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.45;
    }

    .score-line {
      margin-top: 4px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.35;
    }

    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      .game {
        width: min(94vw, 560px);
        padding: max(80px, env(safe-area-inset-top)) 10px 20px;
        transform: none;
        justify-content: flex-start;
      }
      .title { font-size: 48px; letter-spacing: -0.045em; }
      .subtitle {
        max-width: 340px;
        padding: 0 22px;
        margin-top: 6px;
        margin-bottom: 22px;
        font-size: 17px;
        line-height: 1.36;
      }
      .board-shell { padding-left: 8px; padding-right: 8px; }
      .board { gap: 8px; }
      .status { margin-top: 34px; padding-top: 0; }
      .tile-wrap {
        width: clamp(52px, 15.2vw, 64px);
        height: clamp(96px, 27vw, 114px);
      }
      .letter { font-size: clamp(29px, 8vw, 40px); }
      .controls { grid-template-columns: 122px 122px; }
      button { width: 122px; height: 48px; font-size: 16px; }
      .action-slot { width: 122px; height: 48px; }
    }

    @media (min-width: 760px) and (min-height: 650px) and (hover: hover) {
      .game {
        width: min(92vw, 680px);
        transform: translateY(-11.5vh);
      }

      .subtitle { margin-bottom: 44px; }

      .board-shell {
        padding-top: 24px;
        padding-bottom: 24px;
      }

      .board { gap: 14px; }

      .tile-wrap {
        width: clamp(72px, 8.5vw, 92px);
        height: clamp(130px, 15vw, 156px);
      }

      .letter { font-size: clamp(42px, 4.8vw, 56px); }

      .controls {
        grid-template-columns: 140px 140px;
        gap: 10px;
      }

      button {
        width: 140px;
        height: 52px;
        font-size: 16px;
      }

      .action-slot {
        width: 140px;
        height: 52px;
      }

      .message {
        font-size: 25px;
        margin-top: 2px;
      }

      .status,
      .score-line { font-size: 18px; }

      .status { margin-top: 32px; }
    }

    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      .game { display: none; }
      .rotate-message { display: grid; }
    }
  </style>
</head>
<body>
  <div class="rotate-message"><span>Oops, turn your screen so we can fit the puzzle in for you.</span></div>

  <main class="game">
    <h1 class="title">FlipWords</h1>
    <p class="subtitle">Make two new words by flipping and moving the tiles to solve.</p>

    <section class="board-shell" aria-label="Puzzle board">
      <div id="board" class="board"></div>
    </section>

    <div class="feedback-area">
      <div id="message" class="message" aria-live="polite"></div>
    </div>

    <div class="controls">
      <button id="startWordsBtn" class="start-words" type="button">Starters</button>
      <span class="action-slot">
        <button id="hintBtn" class="hint" type="button">Hint</button>
        <button id="nextBtn" class="next" type="button">Next</button>
      </span>
    </div>

    <div id="status" class="status"></div>
    <div id="scoreLine" class="score-line"></div>
  </main>

  <script>
    const puzzles = [
      // 4-letter tests
      { word1: "lazy", word2: "once", answer1: "clay", answer2: "zone", difficulty: "medium" },
      { word1: "race", word2: "mild", answer1: "card", answer2: "lime", difficulty: "easy" },
      { word1: "port", word2: "ride", answer1: "dirt", answer2: "rope", difficulty: "easy" },
      { word1: "corn", word2: "flat", answer1: "clan", answer2: "fort", difficulty: "easy" },
      { word1: "slow", word2: "cord", answer1: "crow", answer2: "sold", difficulty: "easy" },
      { word1: "bowl", word2: "keen", answer1: "blow", answer2: "knee", difficulty: "easy" },
      { word1: "milk", word2: "nose", answer1: "link", answer2: "some", difficulty: "easy" },
      { word1: "rain", word2: "loop", answer1: "nail", answer2: "poor", difficulty: "easy" },
      { word1: "love", word2: "fits", answer1: "five", answer2: "lots", difficulty: "easy" },
      { word1: "safe", word2: "date", answer1: "deaf", answer2: "seat", difficulty: "medium" },
      { word1: "east", word2: "wind", answer1: "dawn", answer2: "ties", difficulty: "medium" },

      // 5-letter tests
      { word1: "least", word2: "saint", answer1: "natal", answer2: "sites", difficulty: "hard" },
      { word1: "blast", word2: "tires", answer1: "salts", answer2: "tribe", difficulty: "hard" },
      { word1: "creep", word2: "saint", answer1: "panic", answer2: "trees", difficulty: "medium" },
      { word1: "least", word2: "cares", answer1: "carts", answer2: "lease", difficulty: "easy" },
      { word1: "fairy", word2: "event", answer1: "every", answer2: "faint", difficulty: "easy" },
      { word1: "spike", word2: "slain", answer1: "likes", answer2: "pains", difficulty: "medium" },
      { word1: "clown", word2: "venue", answer1: "uncle", answer2: "woven", difficulty: "medium" },
      { word1: "spill", word2: "chain", answer1: "hills", answer2: "panic", difficulty: "medium" },
      { word1: "chair", word2: "broke", answer1: "brake", answer2: "choir", difficulty: "easy" },
      { word1: "world", word2: "sites", answer1: "slots", answer2: "weird", difficulty: "medium" },
      { word1: "budget", word2: "mentor", answer1: "button", answer2: "merged", difficulty: "medium" },
      { word1: "smile", word2: "heart", answer1: "earth", answer2: "miles", difficulty: "easy" },
      { word1: "money", word2: "verge", answer1: "enemy", answer2: "grove", difficulty: "easy" },
      { word1: "dance", word2: "tired", answer1: "dried", answer2: "enact", difficulty: "medium" },
      { word1: "carry", word2: "stool", answer1: "carol", answer2: "story", difficulty: "easy" },

      // 6-letter tests
      { word1: "bright", word2: "poison", answer1: "hoping", answer2: "orbits", difficulty: "medium" },
      { word1: "carrot", word2: "danced", answer1: "accord", answer2: "ardent", difficulty: "hard" },
      { word1: "wander", word2: "errors", answer1: "arrows", answer2: "render", difficulty: "easy" },
      { word1: "region", word2: "strait", answer1: "artist", answer2: "ignore", difficulty: "hard" },
      { word1: "doctor", word2: "unions", answer1: "counts", answer2: "indoor", difficulty: "medium" }
    ];

    let puzzleIndex = 0;
    let tiles = [];
    let solved = false;
    let completedWithHints = false;
    let dragState = null;
    let hintOrder = [];
    let hintCursor = 0;
    let hintsUsed = 0;
    let hintOrientationInverted = null;
    let interactionCount = 0;
    let returnedToStartNoticeShown = false;
    let infoMessageTimer = null;
    let returnedToStartTimer = null;
    let totalScore = 0;
    let lastPuzzleScore = null;
    let puzzleAwarded = false;
    let scorePopId = 0;
    const DEBUG = false;

    const board = document.getElementById("board");
    const startWordsBtn = document.getElementById("startWordsBtn");
    const hintBtn = document.getElementById("hintBtn");
    const nextBtn = document.getElementById("nextBtn");
    const message = document.getElementById("message");
    const status = document.getElementById("status");
    const scoreLine = document.getElementById("scoreLine");

    function currentPuzzle() { return puzzles[puzzleIndex]; }
    function pairCode(a, b) { return [a, b].sort().join(""); }

    function buildHintOrder(tileList) {
      return [...tileList]
        .sort((a, b) => a.targetIndex - b.targetIndex)
        .map(t => t.id);
    }

    function computeCanonicalMapping(puzzle, tileIds) {
      const originals = puzzle.word1.split("").map((top, i) => ({
        id: tileIds[i], top, bottom: puzzle.word2[i], code: pairCode(top, puzzle.word2[i])
      }));

      const targets = puzzle.answer1.split("").map((top, i) => ({
        index: i, top, bottom: puzzle.answer2[i], code: pairCode(top, puzzle.answer2[i])
      }));

      const used = new Set();
      const mapping = [];

      function backtrack(pos) {
        if (pos === targets.length) return true;
        const target = targets[pos];

        for (let i = 0; i < originals.length; i++) {
          const tile = originals[i];
          if (used.has(tile.id)) continue;
          if (tile.code !== target.code) continue;

          let flipped = null;
          if (tile.top === target.top && tile.bottom === target.bottom) flipped = false;
          else if (tile.top === target.bottom && tile.bottom === target.top) flipped = true;
          else continue;

          used.add(tile.id);
          mapping.push({ id: tile.id, targetIndex: target.index, targetFlipped: flipped });
          if (backtrack(pos + 1)) return true;
          mapping.pop();
          used.delete(tile.id);
        }
        return false;
      }

      if (!backtrack(0)) throw new Error("Could not compute puzzle mapping");
      return mapping;
    }

    function setupPuzzle() {
      const p = currentPuzzle();
      const baseTiles = p.word1.split("").map((top, i) => ({
        id: `${puzzleIndex}-${i}`,
        top,
        bottom: p.word2[i],
        flipped: false,
        flipAnim: "",
        locked: false,
        targetIndex: null,
        targetFlipped: false
      }));

      const mapping = computeCanonicalMapping(p, baseTiles.map(t => t.id));
      const mappingById = new Map(mapping.map(m => [m.id, m]));

      tiles = baseTiles.map(tile => ({
        ...tile,
        targetIndex: mappingById.get(tile.id).targetIndex,
        targetFlipped: mappingById.get(tile.id).targetFlipped
      }));

      hintOrder = buildHintOrder(tiles);
      hintCursor = 0;
      hintsUsed = 0;
      hintOrientationInverted = null;
      interactionCount = 0;
      returnedToStartNoticeShown = false;
      clearReturnedToStartTimer();
      clearInfoMessage();
      lastPuzzleScore = null;
      puzzleAwarded = false;
      solved = false;
      completedWithHints = false;
      dragState = null;
      clearDragProxy();
      render();
    }

    function visibleTop(tile) { return tile.flipped ? tile.bottom : tile.top; }
    function visibleBottom(tile) { return tile.flipped ? tile.top : tile.bottom; }

    function currentWords() {
      return { top: tiles.map(visibleTop).join(""), bottom: tiles.map(visibleBottom).join("") };
    }

    function isShowingStartingWords() {
      const p = currentPuzzle();
      const words = currentWords();
      return (
        (words.top === p.word1 && words.bottom === p.word2) ||
        (words.top === p.word2 && words.bottom === p.word1)
      );
    }

    function isSolved() {
      const p = currentPuzzle();
      const words = currentWords();
      return (
        (words.top === p.answer1 && words.bottom === p.answer2) ||
        (words.top === p.answer2 && words.bottom === p.answer1)
      );
    }

    function scoreForCurrentPuzzle() {
      const n = tiles.length;
      if (hintsUsed >= n) return 0;
      if (hintsUsed === 0) return 100;
      if (hintsUsed === 1) return 70;
      if (hintsUsed === 2) return 50;
      if (hintsUsed === 3) return 30;
      return 10;
    }

    function awardPuzzleScoreIfNeeded() {
      if (puzzleAwarded) return;
      lastPuzzleScore = scoreForCurrentPuzzle();
      totalScore += lastPuzzleScore;
      puzzleAwarded = true;
      scorePopId++;
    }

    function checkSolved() {
      if (isSolved()) {
        solved = true;
        completedWithHints = hintsUsed >= tiles.length;
        awardPuzzleScoreIfNeeded();
      }
      render();
    }

    function makeTileHTML(tile) {
      return `
        <div class="tile-stage">
          <div class="tile">
            <div class="tile-face front">
              <div class="letter">${tile.top}</div><div class="divider"></div><div class="letter">${tile.bottom}</div>
            </div>
            <div class="tile-face back">
              <div class="letter">${tile.bottom}</div><div class="divider"></div><div class="letter">${tile.top}</div>
            </div>
          </div>
        </div>`;
    }

    function render() {
      board.innerHTML = "";

      tiles.forEach((tile) => {
        const wrap = document.createElement("div");
        wrap.className = "tile-wrap";
        if (tile.flipped) wrap.classList.add("flipped");
        if (tile.flipAnim) wrap.classList.add("flip-feedback", tile.flipAnim);
        if (tile.locked) wrap.classList.add("locked");
        if (solved) wrap.classList.add("solved-tile");
        if (dragState && dragState.tileId === tile.id) wrap.classList.add("dragging");
        wrap.dataset.id = tile.id;
        wrap.dataset.locked = tile.locked ? "1" : "0";
        wrap.innerHTML = makeTileHTML(tile);
        wrap.addEventListener("pointerdown", (event) => handlePointerDown(event, tile.id));
        board.appendChild(wrap);
      });

      const allLocked = tiles.every(t => t.locked);
      nextBtn.classList.toggle("visible", solved);
      hintBtn.classList.toggle("hidden", solved);
      hintBtn.disabled = allLocked;
      startWordsBtn.disabled = solved || isShowingStartingWords();

      if (solved && lastPuzzleScore !== null) {
        clearInfoMessage(false);
        message.classList.toggle("score-zero", lastPuzzleScore === 0);
        message.textContent = `+${lastPuzzleScore}`;
        message.classList.remove("score-pop");
        void message.offsetWidth;
        message.classList.add("score-pop");
      } else if (!message.classList.contains("info")) {
        message.textContent = "";
        message.classList.remove("score-pop", "score-zero");
      }

      if (DEBUG) {
        const words = currentWords();
        const p = currentPuzzle();
        status.textContent = `Current: ${words.top.toUpperCase()} / ${words.bottom.toUpperCase()} · Target: ${p.answer1.toUpperCase()} / ${p.answer2.toUpperCase()}`;
      } else {
        status.textContent = `Level ${puzzleIndex + 1}`;
      }

      scoreLine.textContent = `Score ${totalScore}`;
    }

    function noteInteraction() {
      interactionCount++;
      returnedToStartNoticeShown = false;
      clearReturnedToStartTimer();
    }

    function handlePointerDown(event, tileId) {
      if (solved) return;
      if (event.button !== undefined && event.button !== 0) return;
      const tile = tiles.find(t => t.id === tileId);
      if (!tile || tile.locked) return;

      const tileEl = event.currentTarget;
      const rect = tileEl.getBoundingClientRect();
      dragState = {
        tileId,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        x: event.clientX,
        y: event.clientY,
        lastX: event.clientX,
        hasDragged: false,
        startOrder: tiles.map(t => t.id).join("|"),
        width: rect.width,
        height: rect.height,
        tileSnapshot: { ...tile }
      };

      tileEl.setPointerCapture(event.pointerId);
      document.addEventListener("pointermove", handlePointerMove);
      document.addEventListener("pointerup", handlePointerUp);
      document.addEventListener("pointercancel", handlePointerCancel);
    }

    function handlePointerMove(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      dragState.x = event.clientX;
      dragState.y = event.clientY;
      const dx = event.clientX - dragState.startX;
      const dy = event.clientY - dragState.startY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (!dragState.hasDragged && distance > 7) {
        dragState.hasDragged = true;
        createDragProxy(dragState.tileSnapshot, dragState.x, dragState.y, dragState.width, dragState.height);
        render();
      }
      if (dragState.hasDragged) {
        moveDragProxy(dragState.x, dragState.y);
        liveReorderFromX(event.clientX, dragState.tileId);
      }
    }

    function handlePointerUp(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      const state = dragState;
      cleanupPointerListeners();

      if (!state.hasDragged) {
        const tile = tiles.find(t => t.id === state.tileId);
        if (tile) {
          const wasFlipped = tile.flipped;
          tile.flipAnim = wasFlipped ? "anim-flip-up" : "anim-flip-down";
          tile.flipped = !tile.flipped;
          noteInteraction();
          dragState = null;
          clearDragProxy();
          render();
          window.setTimeout(() => {
            tile.flipAnim = "";
            maybeShowReturnedToStartNotice();
            checkSolved();
          }, 360);
          return;
        }
      }

      if (state.hasDragged && state.startOrder !== tiles.map(t => t.id).join("|")) {
        noteInteraction();
      }

      dragState = null;
      clearDragProxy();
      render();
      maybeShowReturnedToStartNotice();
      checkSolved();
    }

    function handlePointerCancel(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      cleanupPointerListeners();
      dragState = null;
      clearDragProxy();
      render();
    }

    function cleanupPointerListeners() {
      document.removeEventListener("pointermove", handlePointerMove);
      document.removeEventListener("pointerup", handlePointerUp);
      document.removeEventListener("pointercancel", handlePointerCancel);
    }

    function rebuildWithLockedTiles(unlockedOrdered) {
      const result = new Array(tiles.length).fill(null);
      tiles.forEach(tile => { if (tile.locked) result[tile.targetIndex] = tile; });
      let unlockedCursor = 0;
      for (let i = 0; i < result.length; i++) {
        if (result[i] === null) result[i] = unlockedOrdered[unlockedCursor++];
      }
      return result;
    }

    function liveReorderFromX(clientX, tileId) {
      const dragged = tiles.find(t => t.id === tileId);
      if (!dragged || dragged.locked || !dragState) return;

      const otherUnlocked = tiles.filter(t => !t.locked && t.id !== tileId);
      const otherUnlockedEls = Array.from(board.querySelectorAll(".tile-wrap"))
        .filter(el => el.dataset.id !== tileId && el.dataset.locked !== "1");

      const currentUnlockedIndex = tiles.filter(t => !t.locked).findIndex(t => t.id === tileId);
      let insertAt = currentUnlockedIndex;

      const movingRight = clientX > dragState.lastX;
      const movingLeft = clientX < dragState.lastX;

      if (movingRight) {
        for (let i = 0; i < otherUnlockedEls.length; i++) {
          const rect = otherUnlockedEls[i].getBoundingClientRect();
          const threshold = rect.left + rect.width * 0.33;
          if (clientX > threshold) insertAt = i + 1;
        }
      } else if (movingLeft) {
        for (let i = otherUnlockedEls.length - 1; i >= 0; i--) {
          const rect = otherUnlockedEls[i].getBoundingClientRect();
          const threshold = rect.right - rect.width * 0.33;
          if (clientX < threshold) insertAt = i;
        }
      }

      insertAt = Math.max(0, Math.min(insertAt, otherUnlocked.length));
      const newUnlocked = [...otherUnlocked];
      newUnlocked.splice(insertAt, 0, dragged);
      const rebuilt = rebuildWithLockedTiles(newUnlocked);

      if (!sameOrder(rebuilt, tiles)) {
        tiles = rebuilt;
        render();
        moveDragProxy(dragState.x, dragState.y);
      }

      dragState.lastX = clientX;
    }

    function sameOrder(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) if (a[i].id !== b[i].id) return false;
      return true;
    }

    function createDragProxy(tile, x, y, width, height) {
      clearDragProxy();
      const proxy = document.createElement("div");
      proxy.id = "dragProxy";
      proxy.className = "drag-proxy";
      if (tile.flipped) proxy.classList.add("flipped");
      proxy.style.width = `${width}px`;
      proxy.style.height = `${height}px`;
      proxy.innerHTML = makeTileHTML(tile);
      document.body.appendChild(proxy);
      moveDragProxy(x, y);
    }

    function moveDragProxy(x, y) {
      const proxy = document.getElementById("dragProxy");
      if (!proxy) return;
      proxy.style.left = `${x}px`;
      proxy.style.top = `${y}px`;
    }

    function clearDragProxy() {
      const proxy = document.getElementById("dragProxy");
      if (proxy) proxy.remove();
    }

    function forceNonSolvedStateIfNeeded() {
      if (!isSolved()) return;
      if (tiles.every(t => t.locked)) return;

      const flippable = tiles.find(t => !t.locked && t.top !== t.bottom);
      if (flippable) {
        flippable.flipped = !flippable.flipped;
        return;
      }

      const unlockedIndexes = tiles
        .map((tile, index) => ({ tile, index }))
        .filter(item => !item.tile.locked);

      if (unlockedIndexes.length >= 2) {
        const a = unlockedIndexes[0].index;
        const b = unlockedIndexes[1].index;
        [tiles[a], tiles[b]] = [tiles[b], tiles[a]];
      }
    }

    function useHint() {
      if (solved) return;
      while (hintCursor < hintOrder.length) {
        const id = hintOrder[hintCursor++];
        const tile = tiles.find(t => t.id === id);
        if (!tile || tile.locked) continue;

        const isFirstHint = hintsUsed === 0;
        tile.locked = true;

        if (tile.top !== tile.bottom && hintOrientationInverted === null) {
          // The first non-identical hinted tile chooses the answer orientation.
          // Identical tiles like A/A cannot choose an orientation, so they do not
          // force all later hints into the wrong top/bottom arrangement.
          hintOrientationInverted = tile.flipped !== tile.targetFlipped;
        } else if (tile.top !== tile.bottom && hintOrientationInverted !== null) {
          tile.flipped = tile.targetFlipped !== hintOrientationInverted;
        }

        tile.flipAnim = "";
        hintsUsed++;
        interactionCount++;
        returnedToStartNoticeShown = false;

        const unlockedOrdered = tiles.filter(t => !t.locked);
        tiles = rebuildWithLockedTiles(unlockedOrdered);

        forceNonSolvedStateIfNeeded();
        render();
        checkSolved();
        return;
      }
      render();
    }

    function clearInfoMessage(clearText = true) {
      if (infoMessageTimer) {
        window.clearTimeout(infoMessageTimer);
        infoMessageTimer = null;
      }
      message.classList.remove("info");
      message.dataset.infoType = "";
      if (clearText && !solved) message.textContent = "";
    }

    function showInfoMessage(text, type = "info") {
      if (infoMessageTimer) window.clearTimeout(infoMessageTimer);
      message.classList.remove("score-pop", "score-zero", "info");
      message.textContent = text;
      message.dataset.infoType = type;
      void message.offsetWidth;
      message.classList.add("info");

      infoMessageTimer = window.setTimeout(() => {
        message.classList.remove("info");
        message.dataset.infoType = "";
        if (!solved) message.textContent = "";
        infoMessageTimer = null;
      }, 4000);
    }

    function showStartingWords() {
      if (solved || isShowingStartingWords()) return;

      if (message.classList.contains("info") && message.dataset.infoType === "starters") {
        clearInfoMessage();
        return;
      }

      const p = currentPuzzle();
      showInfoMessage(`Started as: ${p.word1.toUpperCase()} / ${p.word2.toUpperCase()}`, "starters");
    }

    function clearReturnedToStartTimer() {
      if (returnedToStartTimer) {
        window.clearTimeout(returnedToStartTimer);
        returnedToStartTimer = null;
      }
    }

    function maybeShowReturnedToStartNotice() {
      clearReturnedToStartTimer();

      if (solved) return;
      if (interactionCount < 3) return;
      if (returnedToStartNoticeShown) return;
      if (!isShowingStartingWords()) return;

      returnedToStartTimer = window.setTimeout(() => {
        returnedToStartTimer = null;
        if (solved) return;
        if (returnedToStartNoticeShown) return;
        if (!isShowingStartingWords()) return;

        returnedToStartNoticeShown = true;
        showInfoMessage("These were the start words", "returned-start");
      }, 1500);
    }

    startWordsBtn.addEventListener("click", showStartingWords);
    hintBtn.addEventListener("click", useHint);
    nextBtn.addEventListener("click", () => {
      puzzleIndex = (puzzleIndex + 1) % puzzles.length;
      setupPuzzle();
    });

    // Prevent accidental double-tap zoom during rapid play on mobile browsers.
    document.addEventListener("dblclick", (event) => {
      event.preventDefault();
    }, { passive: false });

    setupPuzzle();
  </script>
</body>
</html>
