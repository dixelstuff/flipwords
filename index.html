function getPerfectStreakBonus(streak){
  streak=Math.max(0,Math.round(Number(streak)||0));
  if(perfectStreakBonus[streak])return perfectStreakBonus[streak];

function getScore100RunBonus(run){

  if(run===20)return 500;
  if(run>20&&run%20===0)return 500;

}

function applyScore100RunForClueResult(result,hasPriorityStreakMessage=false){
  if(!isNewMode()||!result)return [];
  const messages=[];
  const baseScore=Number(result.score)||0;
  const qualifies=!result.gaveUp&&baseScore>=100;
  if(!qualifies){
    score100Run=0;
    pendingScore100Milestone=null;
    return messages;
  }
  score100Run=Math.max(0,Math.round(Number(score100Run)||0))+1;
  const addBonus=(run,bonus)=>{
    if(!bonus)return;
    result.bonusScore=(Number(result.bonusScore)||0)+bonus;
    messages.push(makeScore100RunMessage(run,bonus));
  };
  if(hasPriorityStreakMessage){
    const milestoneBonus=getScore100RunBonus(score100Run);
    if(milestoneBonus>0&&score100Run>=10)pendingScore100Milestone={run:score100Run,bonus:milestoneBonus};
    return messages;
  }
  if(pendingScore100Milestone&&pendingScore100Milestone.bonus>0){
    addBonus(pendingScore100Milestone.run,pendingScore100Milestone.bonus);
    pendingScore100Milestone=null;
    return messages;
  }
  const bonus=getScore100RunBonus(score100Run);
  if(bonus>0)addBonus(score100Run,bonus);
  return messages;
}

function getBestPerfectStreakFromResults(){

  for(const r of getClueResults()){

      run++;
      if(run>best)best=run;
    }else{

}

function applyPerfectStreakForClueResult(result){
  if(!isNewMode()||!result)return [];
  const messages=[];
  let bonusScore=0;
  if(!result.gaveUp&&result.rating==="perfect"){
    perfectStreak++;
    if(perfectStreak>bestPerfectStreak)bestPerfectStreak=perfectStreak;
    if(perfectStreak>=3){
      const bonus=getPerfectStreakBonus(perfectStreak);
      if(bonus>0){
        bonusScore+=bonus;
        messages.push(`Perfect streak ${perfectStreak}🔥 +${bonus}`);
      }
    }
  }else{
    if(perfectStreak>=3&&perfectStreak>rewardedBestPerfectStreak){
      const bonus=getPerfectStreakBonus(perfectStreak+2);
      if(bonus>0){
        bonusScore+=bonus;
        messages.push(`🔥 New best streak! +${bonus}`);
      }
      rewardedBestPerfectStreak=perfectStreak;
    }

  }

function calculateClueScoreResult({p=currentPuzzle(),elapsedMs=getActivePuzzleElapsedMs(),moves=movesUsed,gaveUp=false,earlySkipPenaltyPoints=clueEarlySkipPenaltyPoints,cluesShown=cluesShownCount}={}){

function awardPuzzleScoreIfNeeded(){
  if(puzzleAwarded)return;
  const elapsedMs=getClueElapsedMs();
  pausePuzzleClock();
  if(isNewMode()){
    const result=calculateClueScoreResult({elapsedMs,moves:movesUsed,gaveUp:false,cluesShown:getCluesShownForRecordedResult(false)});
    const streakMessages=applyPerfectStreakForClueResult(result);
    const runMessages=applyScore100RunForClueResult(result,streakMessages.length>0);
    recordClueResult(result);
    clueVisible=false;
    clearClueInlineCountdownTimer();
    clearClueCountdownMessage();
    lastPuzzleScore=result.score;
    lastAccountingMessages=[result.displayText];
    lastBonusMessages=[...streakMessages,...runMessages];
    puzzleAwarded=true;
    scoreAnimationShown=false;
    return;
  }
  const clean=hintsUsed===0;
  const speedBonus=getSpeedBonusPoints();
  const gross=grossScoreForCurrentPuzzle();
  const penalty=hintPenaltyForCurrentPuzzle();
  lastPuzzleScore=scoreForCurrentPuzzle();
  lastAccountingMessages=[];
  lastBonusMessages=[];

  if(lastPuzzleScore===0){
    lastAccountingMessages.push("+0");
  }else{
    lastAccountingMessages.push(`Solved +${gross}`);
    if(penalty>0)lastAccountingMessages.push(`${hintsUsed===1?"Hint":"Hints"} -${penalty}`);
  }

  if(clean&&speedBonus>0){
    totalScore+=speedBonus;
    stats.speedBonusPoints+=speedBonus;
    lastBonusMessages.push(`Speed bonus +${speedBonus}`);
  }

  if(isEfficientSolve()){
    stats.efficientSolves++;
    if(shields<MAX_SHIELDS){
      shields++;
      lastBonusMessages.push("Efficiency +1 🛡️");
    }else{
      lastBonusMessages.push("Efficiency +1");
    }
  }


  if(clean){
    noHintStreak++;
    const bonus=getStreakBonus(noHintStreak);
    if(bonus){
      totalScore+=bonus.points;
      lastBonusMessages.push(`${bonus.label} +${bonus.points}`);
    }else{
      lastBonusMessages.push("Streak +1 🔥");
    }
  }else if(!shieldUsedThisLevel){
    noHintStreak=0;
    displayedNoHintStreak=0;
  }

  totalScore+=lastPuzzleScore;
  updateStatsForSolvedPuzzle(elapsedMs);
  puzzleAwarded=true;
  scoreAnimationShown=false;
}

function checkAllWords(){
  if(!isAllWordsMode())return false;
  const p=currentPuzzle(),w=currentWords(),allowed=allWordsAllowedSet(),starts=new Set([p.word1,p.word2].map(x=>String(x).toLowerCase()));
  if(isBlockedProperNounSolution()){maybeShowBlockedProperNounNotice();return true}
  const queue=[];
  [[w.top,'top'],[w.bottom,'bottom']].forEach(([raw,row])=>{
    const word=String(raw||"").toLowerCase();
    if(!word)return;
    if(starts.has(word))return;
    if(!allowed.has(word))return;
    const existing=allWordsFoundEntry(word);
    if(existing){
      pulseAllWordsListWord(word);
      return;
    }
    allWordsFound.push({word,starter:false,flib:false});
    allWordsScore++;
    queue.push({text:`${word.toUpperCase()} +1`,flash:row,apply:()=>{}});
    checkAllWordsRanks(queue);
  });
  if(isSolved()&&!allWordsFlibFound){
    allWordsFlibFound=true;
    allWordsScore+=3;
    queue.push({text:"FLIB! +3",flash:"grid",burst:"big",big:true,apply:()=>{[p.answer1,p.answer2].forEach(ans=>{const e=allWordsFoundEntry(ans);if(e)e.flib=true})}});
    checkAllWordsRanks(queue);
  }
  saveAllWordsProgress();
  if(queue.length)allWordsPopSequence(queue);
  else render();
  return true;
}

      clueVisible=false;
      clearClueInlineCountdownTimer();
      clearClueCountdownMessage();
      scoreAnimationShown=true;
      clearInfoMessage(false);

function medianTime(times){
  if(!Array.isArray(times)||!times.length)return null;
  const sorted=[...times].sort((a,b)=>a-b);
  const mid=Math.floor(sorted.length/2);
  return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2;
}

function getClueAwardClassFromText(text){

  if(/Great/.test(t))return "award-great";

function applyDisplayedReward(text){
  const add=text.match(/^\+([0-9]+)$/)||text.match(/^Solved \+([0-9]+)$/)||text.match(/(?:Perfect|Great|Good|Rough|Clunky)!? .*\+([0-9]+)/)||text.match(/Perfect streak [0-9]+🔥 \+([0-9]+)/)||text.match(/(?:🔥 )?New best streak! \+([0-9]+)/i)||text.match(/Broke 💯 [0-9]+ in a row! \+([0-9]+)/)||text.match(/Speed bonus \+([0-9]+)/)||text.match(/[0-9]+-streak \+([0-9]+)/)||text.match(/^Efficiency \+([0-9]+)/);
  if(add&&!isNewMode()&&!/^Efficiency \+1(?:\s|$)/.test(text))displayedTotalScore+=Number(add[1]);
  if(/^Streak \+1/.test(text)||/[0-9]+-streak/.test(text))displayedNoHintStreak=Math.min(noHintStreak,displayedNoHintStreak+1);
  const subtract=text.match(/^Hints? -([0-9]+)$/);
  if(subtract)displayedTotalScore=Math.max(0,displayedTotalScore-Number(subtract[1]));
  const shieldMatch=text.match(/^(?:Shield|Efficiency) \+([0-9]+)/);
  if(shieldMatch&&/^Efficiency \+1 .*🛡️/.test(text))displayedShields=Math.min(MAX_SHIELDS,displayedShields+1);
  else if(shieldMatch&&!text.startsWith("Efficiency"))displayedShields=Math.min(MAX_SHIELDS,displayedShields+Number(shieldMatch[1]));
  updateFooterDisplay();
}

}

function currentOrientationScore(inverted=false){
  const p=currentPuzzle(),w=currentWords();
  const topTarget=inverted?p.answer2:p.answer1,bottomTarget=inverted?p.answer1:p.answer2;

  for(let i=0;i<topTarget.length;i++){

  }
