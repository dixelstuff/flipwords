function computeCanonicalMapping(p,tileIds){
  const originals=p.word1.split("").map((top,i)=>({id:tileIds[i],top,bottom:p.word2[i],code:pairCode(top,p.word2[i])}));
  const targets=p.answer1.split("").map((top,i)=>({index:i,top,bottom:p.answer2[i],code:pairCode(top,p.answer2[i])}));
  const used=new Set(),mapping=[];
  function backtrack(pos){
    if(pos===targets.length)return true;
    const target=targets[pos];
    for(const tile of originals){
      if(used.has(tile.id)||tile.code!==target.code)continue;
      let flipped=null;
      if(tile.top===target.top&&tile.bottom===target.bottom)flipped=false;

      used.add(tile.id);mapping.push({id:tile.id,targetIndex:target.index,targetFlipped:flipped});

    }
    return false;
  }

}
function buildHintOrder(list){return[...list].sort((a,b)=>a.targetIndex-b.targetIndex).map(t=>t.id)}
function setupPuzzle(opts={}){
  clearAllTimers();
  const p=currentPuzzle(),restoreHints=Number(opts.restoreHints||0);
  const base=p.word1.split("").map((top,i)=>({id:`${puzzleIndex}-${i}`,top,bottom:p.word2[i],flipped:false,flipAnim:"",locked:false,targetIndex:null,targetFlipped:false}));
  const mapById=new Map(computeCanonicalMapping(p,base.map(t=>t.id)).map(m=>[m.id,m]));
  tiles=base.map(t=>({...t,...mapById.get(t.id)}));
  hintOrder=buildHintOrder(tiles);hintCursor=0;hintsUsed=0;hintOrientationInverted=null;
  solved=false;completedWithHints=false;dragState=null;previewingStartWords=false;shieldUsedThisLevel=false;puzzleAwarded=false;scoreAnimationShown=false;lastPuzzleScore=null;lastBonusMessages=[];
  interactionCount=0;returnedToStartNoticeShown=false;blockedNoticeShown=false;puzzleStartTime=opts.restoreStartTime||Date.now();
  clearDragProxy();
  if(restoreHints>0)applyHintsSilently(Math.min(restoreHints,tiles.length));
  if(opts.restoreSolved){lockAllTilesToAnswer();solved=true;completedWithHints=!!opts.restoreCompletedWithHints;puzzleAwarded=!!opts.restoreAwarded;lastPuzzleScore=typeof opts.restoreLastScore==="number"?opts.restoreLastScore:null;lastBonusMessages=Array.isArray(opts.restoreBonusMessages)?opts.restoreBonusMessages:[];scoreAnimationShown=true}
  render();saveGameState();startAutoHintTimer();
}

function isShowingStartingWords(){const p=currentPuzzle(),w=currentWords();return(w.top===p.word1&&w.bottom===p.word2)||(w.top===p.word2&&w.bottom===p.word1)}
function isSolved(){const p=currentPuzzle(),w=currentWords();return(w.top===p.answer1&&w.bottom===p.answer2)||(w.top===p.answer2&&w.bottom===p.answer1)}
function isBlockedProperNounSolution(){const p=currentPuzzle(),w=currentWords();return!!(p.blocked1&&p.blocked2&&((w.top===p.blocked1&&w.bottom===p.blocked2)||(w.top===p.blocked2&&w.bottom===p.blocked1)))}
function scoreForCurrentPuzzle(){const hintsRemaining=Math.max(0,tiles.length-hintsUsed);return hintsRemaining===0?0:hintsRemaining*20+20}
function getStreakBonus(streak){return streak>=5&&streak%5===0?{label:`${streak}-clean streak`,points:streak*11}:null}
function getQuickSolveLimitMs(){return QUICK_SOLVE_LIMITS_MS[tiles.length]||QUICK_SOLVE_LIMITS_MS[6]}
function getQuickSolvePoints(){return QUICK_SOLVE_POINTS_BY_LENGTH[tiles.length]||QUICK_SOLVE_POINTS_BY_LENGTH[6]}
function getAutoHintDelayMs(){return AUTO_HINT_DELAY_LIMITS_MS[tiles.length]||AUTO_HINT_DELAY_LIMITS_MS[6]}
function awardPuzzleScoreIfNeeded(){
  if(puzzleAwarded)return;
  const clean=hintsUsed===0,quick=Date.now()-puzzleStartTime<=getQuickSolveLimitMs();
  lastPuzzleScore=scoreForCurrentPuzzle();lastBonusMessages=[];
  if(clean&&quick){const quickPoints=getQuickSolvePoints();totalScore+=quickPoints;shields=Math.min(MAX_SHIELDS,shields+1);lastBonusMessages.push(`Quick solve +${quickPoints}`)}
  if(clean){noHintStreak++;const bonus=getStreakBonus(noHintStreak);if(bonus){totalScore+=bonus.points;lastBonusMessages.push(`${bonus.label} +${bonus.points}`)}}else if(shieldUsedThisLevel){lastBonusMessages.push("Streak shield used")}else noHintStreak=0;
  totalScore+=lastPuzzleScore;puzzleAwarded=true;scoreAnimationShown=false;
}
function checkSolved(){if(isSolved()){solved=true;completedWithHints=hintsUsed>=tiles.length;stopAutoHintTimer();awardPuzzleScoreIfNeeded()}render();saveGameState()}

function makeTileHTML(t){return`<div class="tile-stage"><div class="tile"><div class="tile-face front"><div class="letter">${t.top}</div><div class="divider"></div><div class="letter">${t.bottom}</div></div><div class="tile-face back"><div class="letter">${t.bottom}</div><div class="divider"></div><div class="letter">${t.top}</div></div></div></div>`}
function startPreviewTiles(){const p=currentPuzzle();return p.word1.split("").map((top,i)=>({id:`preview-${i}`,top,bottom:p.word2[i],flipped:false,flipAnim:"",locked:false}))}
function render(){
  const renderTiles=previewingStartWords?startPreviewTiles():tiles;
  board.classList.toggle("short-board",renderTiles.length<=3);board.innerHTML="";
  renderTiles.forEach(t=>{const w=document.createElement("div");w.className="tile-wrap";if(t.flipped)w.classList.add("flipped");if(t.flipAnim)w.classList.add("flip-feedback",t.flipAnim);if(t.locked)w.classList.add("locked");if(solved&&!previewingStartWords)w.classList.add("solved-tile");if(dragState?.tileId===t.id)w.classList.add("dragging");w.dataset.id=t.id;w.dataset.locked=t.locked?"1":"0";w.innerHTML=makeTileHTML(t);w.addEventListener("pointerdown",e=>handlePointerDown(e,t.id));board.appendChild(w)});
  const allLocked=tiles.every(t=>t.locked),isFinal=puzzleIndex>=puzzles.length-1;
  nextBtn.classList.toggle("visible",solved&&!isFinal);nextBtn.textContent="Next";
  hintBtn.disabled=solved||allLocked;startWordsBtn.disabled=solved||isShowingStartingWords();
  if(solved&&lastPuzzleScore!==null&&!scoreAnimationShown){clearInfoMessage(false);popMessage(`+${lastPuzzleScore}`,lastPuzzleScore===0);scoreAnimationShown=true;queueBonusAnimations()}
  else if(!message.classList.contains("info")&&!message.classList.contains("score-pop")&&!message.classList.contains("hold-score")){message.textContent="";message.classList.remove("score-zero")}
  subtitle.classList.toggle("level-label",puzzleIndex>0);
  subtitle.textContent=puzzleIndex===0?"Make two new words by flipping and moving the tiles to solve.":`Level ${puzzleIndex+1}`;
  if(solved&&isFinal&&!DEBUG){status.innerHTML='Refresh your browser to see if there are more puzzles yet.<br>If you want to restart at level 1 <a href="#" id="restartLink" class="restart-link">click here</a>.'}else status.innerHTML=DEBUG?JSON.stringify(currentWords()):`Score ${totalScore}`;scoreLine.innerHTML=`${noHintStreak>0&&hintsUsed===0?`Streak ${noHintStreak}`:"&nbsp;"}${shields>0?`<br>Shields ${shields}`:""}`;
}
function popMessage(text,isZero=false){message.classList.remove("info","score-pop","score-zero","streak-pop","quick-pop");message.classList.toggle("score-zero",isZero);message.classList.toggle("streak-pop",/clean streak/.test(text));message.classList.toggle("quick-pop",/Quick solve/.test(text));message.textContent=text;void message.offsetWidth;message.classList.add("score-pop")}
function showStarBurst(){starBurst.innerHTML="";[[-170,-80,-35],[165,-90,30],[-115,-155,45],[120,-165,-40],[-210,10,-25],[210,8,35],[-125,125,30],[130,120,-30],[-70,-220,-20],[75,215,25]].forEach(([x,y,r])=>{const s=document.createElement("span");s.className="star";s.textContent="★";s.style.setProperty("--x",`${x}px`);s.style.setProperty("--y",`${y}px`);s.style.setProperty("--r",`${r}deg`);starBurst.appendChild(s)});setTimeout(()=>{starBurst.innerHTML=""},1150)}
function queueBonusAnimations(){clearBonusTimers();lastBonusMessages.forEach((text,i)=>bonusTimerIds.push(setTimeout(()=>{popMessage(text,false);if(/Quick solve|clean streak/.test(text))showStarBurst()},1150+i*1200)))}

function noteInteraction(){interactionCount++;returnedToStartNoticeShown=false;blockedNoticeShown=false;clearReturnedToStartTimer();clearNoticeTimer();if(message.classList.contains("info")&&(message.dataset.infoType==="returned-start"||message.dataset.infoType==="blocked-proper"))clearInfoMessage()}
function maybeShowReturnedToStartNotice(){clearReturnedToStartTimer();if(solved||interactionCount<3||returnedToStartNoticeShown||!isShowingStartingWords())return;returnedToStartTimer=setTimeout(()=>{if(!solved&&!returnedToStartNoticeShown&&isShowingStartingWords()){returnedToStartNoticeShown=true;showInfoMessage("These were the start words","returned-start")}},1500)}
function maybeShowBlockedProperNounNotice(){clearNoticeTimer();if(solved||blockedNoticeShown||!isBlockedProperNounSolution())return;noticeTimer=setTimeout(()=>{if(!solved&&!blockedNoticeShown&&isBlockedProperNounSolution()){blockedNoticeShown=true;showInfoMessage("Proper nouns not allowed","blocked-proper")}},1500)}
function showInfoMessage(text,type="info"){if(infoMessageTimer)clearTimeout(infoMessageTimer);message.classList.remove("score-pop","score-zero","quick-pop","streak-pop","info");message.textContent=text;message.dataset.infoType=type;void message.offsetWidth;message.classList.add("info");infoMessageTimer=setTimeout(()=>{message.classList.remove("info");message.dataset.infoType="";if(!solved)message.textContent="";infoMessageTimer=null},4000)}
function showStartingWords(){if(solved||isShowingStartingWords())return;if(message.classList.contains("info")&&message.dataset.infoType==="starters"){clearInfoMessage();return}const p=currentPuzzle();showInfoMessage(`Started as: ${p.word1.toUpperCase()} / ${p.word2.toUpperCase()}`,"starters")}
function showSolvedStartPreview(){
  if(!solved||previewingStartWords)return;
  previewingStartWords=true;
  clearInfoMessage(false);
  message.classList.remove("info","score-pop","score-zero","quick-pop","streak-pop");
  message.classList.add("hold-score");
  message.textContent="These were the start words";
  render();
}
function hideSolvedStartPreview(){
  if(!previewingStartWords)return;
  previewingStartWords=false;
  message.classList.remove("score-pop","score-zero","quick-pop","streak-pop","hold-score");
  message.textContent="";
  render();
}

function handlePointerDown(e,id){if(solved||(e.button!==undefined&&e.button!==0))return;const t=tiles.find(x=>x.id===id);if(!t||t.locked)return;const r=e.currentTarget.getBoundingClientRect();dragState={tileId:id,pointerId:e.pointerId,startX:e.clientX,startY:e.clientY,x:e.clientX,y:e.clientY,lastX:e.clientX,hasDragged:false,startOrder:tiles.map(t=>t.id).join("|"),width:r.width,height:r.height,tileSnapshot:{...t}};e.currentTarget.setPointerCapture(e.pointerId);document.addEventListener("pointermove",handlePointerMove);document.addEventListener("pointerup",handlePointerUp);document.addEventListener("pointercancel",handlePointerCancel)}
function handlePointerMove(e){if(!dragState||e.pointerId!==dragState.pointerId)return;dragState.x=e.clientX;dragState.y=e.clientY;const dx=e.clientX-dragState.startX,dy=e.clientY-dragState.startY;if(!dragState.hasDragged&&Math.hypot(dx,dy)>7){dragState.hasDragged=true;createDragProxy(dragState.tileSnapshot,dragState.x,dragState.y,dragState.width,dragState.height);render()}if(dragState.hasDragged){moveDragProxy(dragState.x,dragState.y);liveReorderFromX(e.clientX,dragState.tileId)}}
function handlePointerUp(e){if(!dragState||e.pointerId!==dragState.pointerId)return;const s=dragState;cleanupPointerListeners();if(!s.hasDragged){const t=tiles.find(x=>x.id===s.tileId);if(t){t.flipAnim=t.flipped?"anim-flip-up":"anim-flip-down";t.flipped=!t.flipped;noteInteraction();dragState=null;clearDragProxy();render();setTimeout(()=>{t.flipAnim="";maybeShowReturnedToStartNotice();maybeShowBlockedProperNounNotice();checkSolved()},360);return}}if(s.hasDragged&&s.startOrder!==tiles.map(t=>t.id).join("|"))noteInteraction();dragState=null;clearDragProxy();render();maybeShowReturnedToStartNotice();maybeShowBlockedProperNounNotice();checkSolved()}
function handlePointerCancel(e){if(!dragState||e.pointerId!==dragState.pointerId)return;cleanupPointerListeners();dragState=null;clearDragProxy();render()}
function cleanupPointerListeners(){document.removeEventListener("pointermove",handlePointerMove);document.removeEventListener("pointerup",handlePointerUp);document.removeEventListener("pointercancel",handlePointerCancel)}
function liveReorderFromX(x,id){const dragged=tiles.find(t=>t.id===id);if(!dragged||dragged.locked||!dragState)return;const others=tiles.filter(t=>!t.locked&&t.id!==id),els=[...board.querySelectorAll(".tile-wrap")].filter(el=>el.dataset.id!==id&&el.dataset.locked!=="1");let insertAt=tiles.filter(t=>!t.locked).findIndex(t=>t.id===id);if(x>dragState.lastX){for(let i=0;i<els.length;i++){const r=els[i].getBoundingClientRect();if(x>r.left+r.width*.33)insertAt=i+1}}else if(x<dragState.lastX){for(let i=els.length-1;i>=0;i--){const r=els[i].getBoundingClientRect();if(x<r.right-r.width*.33)insertAt=i}}insertAt=clamp(insertAt,0,others.length);const next=[...others];next.splice(insertAt,0,dragged);const rebuilt=rebuildWithLockedTiles(next);if(!sameOrder(rebuilt,tiles)){tiles=rebuilt;render();moveDragProxy(dragState.x,dragState.y)}dragState.lastX=x}
function sameOrder(a,b){return a.length===b.length&&a.every((t,i)=>t.id===b[i].id)}
function rebuildWithLockedTiles(unlocked){const res=Array(tiles.length).fill(null);tiles.forEach(t=>{if(t.locked)res[t.targetIndex]=t});let c=0;for(let i=0;i<res.length;i++)if(!res[i])res[i]=unlocked[c++];return res}
function createDragProxy(t,x,y,w,h){clearDragProxy();const p=document.createElement("div");p.id="dragProxy";p.className="drag-proxy";if(t.flipped)p.classList.add("flipped");p.style.width=`${w}px`;p.style.height=`${h}px`;p.innerHTML=makeTileHTML(t);document.body.appendChild(p);moveDragProxy(x,y)}
function moveDragProxy(x,y){const p=$("dragProxy");if(p){p.style.left=`${x}px`;p.style.top=`${y}px`}}
function clearDragProxy(){$("dragProxy")?.remove()}

function applyOneHint({silent=false}={}){while(hintCursor<hintOrder.length){const id=hintOrder[hintCursor++],t=tiles.find(x=>x.id===id);if(!t||t.locked)continue;const first=hintsUsed===0;if(first&&!shieldUsedThisLevel&&shields>0){shields--;shieldUsedThisLevel=true}t.locked=true;if(first){if(t.top!==t.bottom)hintOrientationInverted=t.flipped!==t.targetFlipped}else if(t.top!==t.bottom){if(hintOrientationInverted===null)hintOrientationInverted=t.flipped!==t.targetFlipped;t.flipped=t.targetFlipped!==hintOrientationInverted}t.flipAnim="";hintsUsed++;if(!silent)noteInteraction();tiles=rebuildWithLockedTiles(tiles.filter(t=>!t.locked));forceNonSolvedStateIfNeeded();return true}return false}
function applyHintsSilently(n){for(let i=0;i<n;i++)if(!applyOneHint({silent:true}))break}
function lockAllTilesToAnswer(){tiles.forEach(t=>{t.locked=true;if(t.top!==t.bottom)t.flipped=t.targetFlipped});tiles=[...tiles].sort((a,b)=>a.targetIndex-b.targetIndex)}
function forceNonSolvedStateIfNeeded(){if(!isSolved()||tiles.every(t=>t.locked))return;const f=tiles.find(t=>!t.locked&&t.top!==t.bottom);if(f){f.flipped=!f.flipped;return}const u=tiles.map((tile,index)=>({tile,index})).filter(i=>!i.tile.locked);if(u.length>=2)[tiles[u[0].index],tiles[u[1].index]]=[tiles[u[1].index],tiles[u[0].index]]}
function useHint(){if(solved)return;stopAutoHintTimer();if(applyOneHint()){render();checkSolved();saveGameState()}else render();if(!solved)startAutoHintTimer()}

function setHintFill(pct){hintBtn.style.setProperty("--hint-fill",`${clamp(pct,0,100)}%`)}
function clearAutoHintTimers(){if(autoHintDelayTimer)clearTimeout(autoHintDelayTimer);if(autoHintFrame)cancelAnimationFrame(autoHintFrame);autoHintDelayTimer=null;autoHintFrame=null}
function stopAutoHintTimer(){clearAutoHintTimers();autoHintDelayStartedAt=null;autoHintDelayRemainingMs=null;autoHintFillStart=null;autoHintFillElapsedMs=0;autoHintFilling=false;setHintFill(0)}
function startAutoHintTimer(delayMs=null){stopAutoHintTimer();if(solved||hintBtn.disabled||document.hidden)return;autoHintDelayRemainingMs=delayMs??getAutoHintDelayMs();autoHintDelayStartedAt=performance.now();autoHintDelayTimer=setTimeout(beginAutoHintFill,autoHintDelayRemainingMs)}
function beginAutoHintFill(){clearAutoHintTimers();if(solved||hintBtn.disabled||document.hidden)return;autoHintFilling=true;autoHintFillStart=performance.now()-autoHintFillElapsedMs;const step=now=>{if(document.hidden)return;autoHintFillElapsedMs=now-autoHintFillStart;const pct=(autoHintFillElapsedMs/AUTO_HINT_FILL_MS)*100;setHintFill(pct);if(pct>=100)useHint();else autoHintFrame=requestAnimationFrame(step)};autoHintFrame=requestAnimationFrame(step)}
function pauseAutoHintTimer(){if(!autoHintDelayTimer&&!autoHintFrame)return;if(autoHintFilling){if(autoHintFrame)cancelAnimationFrame(autoHintFrame);autoHintFrame=null;if(autoHintFillStart!==null)autoHintFillElapsedMs=Math.min(AUTO_HINT_FILL_MS,performance.now()-autoHintFillStart)}else{if(autoHintDelayTimer)clearTimeout(autoHintDelayTimer);autoHintDelayTimer=null;if(autoHintDelayStartedAt!==null)autoHintDelayRemainingMs=Math.max(0,autoHintDelayRemainingMs-(performance.now()-autoHintDelayStartedAt))}autoHintDelayStartedAt=null}
function resumeAutoHintTimer(){if(solved||hintBtn.disabled||document.hidden)return;if(autoHintFilling)beginAutoHintFill();else startAutoHintTimer(autoHintDelayRemainingMs??getAutoHintDelayMs())}

function clearBonusTimers(){bonusTimerIds.forEach(id=>clearTimeout(id));bonusTimerIds=[]}
function clearReturnedToStartTimer(){if(returnedToStartTimer){clearTimeout(returnedToStartTimer);returnedToStartTimer=null}}
function clearNoticeTimer(){if(noticeTimer){clearTimeout(noticeTimer);noticeTimer=null}}
function clearInfoMessage(clearText=true){if(infoMessageTimer){clearTimeout(infoMessageTimer);infoMessageTimer=null}message.classList.remove("info");message.dataset.infoType="";if(clearText&&!solved)message.textContent=""}
function clearAllTimers(){clearReturnedToStartTimer();clearNoticeTimer();clearInfoMessage();clearBonusTimers();stopAutoHintTimer()}

hintBtn.addEventListener("click",()=>useHint());
startWordsBtn.addEventListener("click",showStartingWords);
nextBtn.addEventListener("click",goNext);
document.querySelector(".game").addEventListener("pointerdown",e=>{
  if(!solved||e.target.closest(".controls"))return;
  const top=document.querySelector(".title").getBoundingClientRect().bottom;
  const bottom=document.querySelector(".controls").getBoundingClientRect().top;
  if(e.clientY<top||e.clientY>bottom)return;
  e.preventDefault();
  showSolvedStartPreview();
  e.currentTarget.setPointerCapture?.(e.pointerId);
});
document.querySelector(".game").addEventListener("pointerup",hideSolvedStartPreview);
document.querySelector(".game").addEventListener("pointercancel",hideSolvedStartPreview);
document.querySelector(".game").addEventListener("lostpointercapture",hideSolvedStartPreview);
status.addEventListener("click",e=>{if(e.target&&e.target.id==="restartLink"){e.preventDefault();resetGame(0)}});
document.addEventListener("dblclick",e=>e.preventDefault(),{passive:false});
document.addEventListener("selectstart",e=>e.preventDefault(),{passive:false});
document.addEventListener("contextmenu",e=>e.preventDefault(),{passive:false});
document.addEventListener("gesturestart",e=>e.preventDefault(),{passive:false});
document.addEventListener("visibilitychange",()=>{document.hidden?pauseAutoHintTimer():resumeAutoHintTimer()});
window.addEventListener("pagehide",pauseAutoHintTimer);
window.addEventListener("pageshow",resumeAutoHintTimer);
window.addEventListener("orientationchange",()=>setTimeout(()=>{message.classList.remove("score-pop","score-zero");if(!message.classList.contains("info"))message.textContent=""},80));
window.addEventListener("resize",()=>{if(solved){message.classList.remove("score-pop","score-zero");if(!message.classList.contains("info"))message.textContent=""}});

function initGame(){const saved=loadSavedState();if(window.__jumpLevel!==undefined&&window.__jumpLevel!==null){resetGame(window.__jumpLevel-1);return}if(saved){if(Number.isInteger(saved.puzzleIndex))puzzleIndex=clamp(saved.puzzleIndex,0,puzzles.length-1);if(typeof saved.totalScore==="number"&&Number.isFinite(saved.totalScore))totalScore=Math.max(0,saved.totalScore);if(Number.isInteger(saved.noHintStreak))noHintStreak=Math.max(0,saved.noHintStreak);if(Number.isInteger(saved.shields))shields=clamp(saved.shields,0,MAX_SHIELDS);shieldUsedThisLevel=!!saved.shieldUsedThisLevel}setupPuzzle({restoreHints:saved&&Number.isInteger(saved.hintsUsed)?Math.max(0,saved.hintsUsed):0,restoreSolved:!!(saved&&saved.solved),restoreCompletedWithHints:!!(saved&&saved.completedWithHints),restoreAwarded:!!(saved&&saved.puzzleAwarded),restoreLastScore:saved&&typeof saved.lastPuzzleScore==="number"?saved.lastPuzzleScore:null,restoreBonusMessages:saved&&Array.isArray(saved.lastBonusMessages)?saved.lastBonusMessages:[],restoreStartTime:saved&&typeof saved.puzzleStartTime==="number"?saved.puzzleStartTime:Date.now()})}
initGame();
</script>
