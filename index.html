function computeCanonicalMapping(p,tileIds){
  const originals=p.word1.split("").map((top,i)=>({id:tileIds[i],top,bottom:p.word2[i],code:pairCode(top,p.word2[i])}));
  const targets=p.answer1.split("").map((top,i)=>({index:i,top,bottom:p.answer2[i],code:pairCode(top,p.answer2[i])}));
  const used=new Set(),mapping=[];
  function backtrack(pos){
    if(pos===targets.length)return true;
    const target=targets[pos];
    for(const tile of originals){
      if(used.has(tile.id)||tile.code!==target.code)continue;
      let flipped=null;
      if(tile.top===target.top&&tile.bottom===target.bottom)flipped=false;
      else if(tile.top===target.bottom&&tile.bottom===target.top)flipped=true;
      else continue;
      used.add(tile.id);mapping.push({id:tile.id,targetIndex:target.index,targetFlipped:flipped});
      if(backtrack(pos+1))return true;
      mapping.pop();used.delete(tile.id);
    }
    return false;
  }
  if(!backtrack(0))throw Error("Could not compute puzzle mapping");
  return mapping;
}
function buildHintOrder(list){return[...list].sort((a,b)=>a.targetIndex-b.targetIndex).map(t=>t.id)}

  const mapById=new Map(computeCanonicalMapping(p,base.map(t=>t.id)).map(m=>[m.id,m]));
  tiles=base.map(t=>({...t,...mapById.get(t.id)}));
  hintOrder=buildHintOrder(tiles);hintCursor=0;hintsUsed=0;movesUsed=0;hintOrientationInverted=null;
  solved=false;completedWithHints=false;dragState=null;previewingStartWords=false;solvedToggleReadyAt=0;solvedAnswerInverted=false;shieldUsedThisLevel=false;
  puzzleAwarded=false;scoreAnimationShown=false;lastPuzzleScore=null;lastAccountingMessages=[];lastBonusMessages=[];
  interactionCount=0;returnedToStartNoticeShown=false;blockedNoticeShown=false;puzzleStartTime=opts.restoreStartTime||Date.now();
  clearDragProxy();
  if(restoreHints>0)applyHintsSilently(Math.min(restoreHints,tiles.length));
  movesUsed=Number.isInteger(opts.restoreMovesUsed)?Math.max(0,opts.restoreMovesUsed):0;
  shieldUsedThisLevel=!!opts.restoreShieldUsedThisLevel;
  if(opts.restoreSolved){
    solvedAnswerInverted=!!opts.restoreSolvedAnswerInverted;lockAllTilesToAnswer(solvedAnswerInverted);solved=true;solvedToggleReadyAt=0;completedWithHints=!!opts.restoreCompletedWithHints;puzzleAwarded=!!opts.restoreAwarded;
    lastPuzzleScore=typeof opts.restoreLastScore==="number"?opts.restoreLastScore:null;scoreAnimationShown=true;
  }
  render();saveGameState();
  if(!solved){
    if(opts.restoreAutoHintFilling){

}

function isShowingStartingWords(){const p=currentPuzzle(),w=currentWords();return(w.top===p.word1&&w.bottom===p.word2)||(w.top===p.word2&&w.bottom===p.word1)}
function isSolved(){const p=currentPuzzle(),w=currentWords();return(w.top===p.answer1&&w.bottom===p.answer2)||(w.top===p.answer2&&w.bottom===p.answer1)}
function isBlockedProperNounSolution(){const p=currentPuzzle(),w=currentWords();return!!(p.blocked1&&p.blocked2&&((w.top===p.blocked1&&w.bottom===p.blocked2)||(w.top===p.blocked2&&w.bottom===p.blocked1)))}
function getSingleStartWordMatch(){const p=currentPuzzle(),w=currentWords(),starts=[p.word1,p.word2];const matches=[w.top,w.bottom].filter(word=>starts.includes(word));return matches.length===1?matches[0]:null}
function scoreByHintsRemaining(n){return SCORE_BY_HINTS_REMAINING[Math.max(0,Math.min(6,n))]??0}
function grossScoreForCurrentPuzzle(){return scoreByHintsRemaining(tiles.length)}

function hintPenaltyForCurrentPuzzle(){return Math.max(0,grossScoreForCurrentPuzzle()-scoreForCurrentPuzzle())}
function getStreakBonus(streak){return streak>=5&&streak%5===0?{label:`${streak}-streak`,points:streak*15}:null}
function getAutoHintDelayForTileCount(n){return AUTO_HINT_DELAY_BY_UNLOCKED_TILES_MS[n]??null}
function getSpeedBonusLimitMs(){return (getAutoHintDelayForTileCount(tiles.length)||0)*SPEED_BONUS_WINDOW_FACTOR}
function roundToNearestFive(n){return Math.round(n/5)*5}
function getSpeedBonusPoints(){
  if(!ENABLE_SPEED_BONUS||hintsUsed>0)return 0;
  const limit=getSpeedBonusLimitMs();
  if(!limit)return 0;
  const elapsed=Date.now()-puzzleStartTime;
  if(elapsed>limit)return 0;
  const raw=MAX_SPEED_BONUS-(elapsed/limit)*(MAX_SPEED_BONUS-5);
  const rounded=roundToNearestFive(raw);
  return rounded<MIN_SPEED_BONUS?0:clamp(rounded,MIN_SPEED_BONUS,MAX_SPEED_BONUS);
}
function getAutoHintDelayMs(){
  const unlocked=tiles.filter(t=>!t.locked).length;

function getEfficiencyMoveLimit(){
  const minMoves=Number(currentPuzzle().minMoves);
  if(!Number.isFinite(minMoves)||minMoves<=0)return null;
  const extra=EFFICIENCY_EXTRA_MOVES_BY_LENGTH[tiles.length]??EFFICIENCY_EXTRA_MOVES_BY_LENGTH[6];
  return minMoves+extra;
}

function awardPuzzleScoreIfNeeded(){
  if(puzzleAwarded)return;
  const clean=hintsUsed===0;
  const speedBonus=getSpeedBonusPoints();
  const gross=grossScoreForCurrentPuzzle();
  const penalty=hintPenaltyForCurrentPuzzle();
  lastPuzzleScore=scoreForCurrentPuzzle();
  lastAccountingMessages=[];
  lastBonusMessages=[];

  if(lastPuzzleScore===0){
    lastAccountingMessages.push("+0");
  }else{
    lastAccountingMessages.push(`Solved +${gross}`);
    if(penalty>0)lastAccountingMessages.push(`${hintsUsed===1?"Hint":"Hints"} -${penalty}`);
  }

  if(clean&&speedBonus>0){
    totalScore+=speedBonus;
    lastBonusMessages.push(`Speed bonus +${speedBonus}`);
  }

  if(isEfficientSolve()){
    if(shields<MAX_SHIELDS){
      shields++;
      lastBonusMessages.push("Efficiency +1 🛡️");
    }else{
      totalScore+=EFFICIENCY_CAP_POINTS;
      lastBonusMessages.push(`Efficiency +${EFFICIENCY_CAP_POINTS}`);
    }
  }

  const shieldLevel=ENABLE_LEVEL_BONUS_SHIELDS&&(puzzleIndex+1)%10===0;
  if(shieldLevel&&shields<MAX_SHIELDS){
    shields++;
    lastBonusMessages.push(`Level ${puzzleIndex+1} bonus +1`);
  }

  if(clean){
    noHintStreak++;
    const bonus=getStreakBonus(noHintStreak);
    if(bonus){
      totalScore+=bonus.points;
      lastBonusMessages.push(`${bonus.label} +${bonus.points}`);
    }else{
      lastBonusMessages.push("Streak +1 🔥");
    }
  }else if(!shieldUsedThisLevel){
    noHintStreak=0;
    displayedNoHintStreak=0;
  }

  totalScore+=lastPuzzleScore;
  puzzleAwarded=true;
  scoreAnimationShown=false;
}

function applyDisplayedReward(text){
  const add=text.match(/^\+([0-9]+)$/)||text.match(/^Solved \+([0-9]+)$/)||text.match(/Speed bonus \+([0-9]+)/)||text.match(/[0-9]+-streak \+([0-9]+)/)||text.match(/^Efficiency \+([0-9]+)/);
  if(add&&!/^Efficiency \+1(?:\s|$)/.test(text))displayedTotalScore+=Number(add[1]);
  if(/^Streak \+1/.test(text)||/[0-9]+-streak/.test(text))displayedNoHintStreak=Math.min(noHintStreak,displayedNoHintStreak+1);
  const subtract=text.match(/^Hints? -([0-9]+)$/);
  if(subtract)displayedTotalScore=Math.max(0,displayedTotalScore-Number(subtract[1]));
  const shieldMatch=text.match(/^(?:Shield|Efficiency|Level [0-9]+ bonus) \+([0-9]+)/);
  if(shieldMatch&&/^Efficiency \+1(?:\s|$)/.test(text))displayedShields=Math.min(MAX_SHIELDS,displayedShields+1);
  else if(shieldMatch&&!text.startsWith("Efficiency"))displayedShields=Math.min(MAX_SHIELDS,displayedShields+Number(shieldMatch[1]));
  updateFooterDisplay();
}
function popMessage(text,isZero=false,isFinal=false){
  const isEfficiencyShield=/^Efficiency \+1(?:\s|$)/.test(text);
  const isShieldReward=/^(?:Shield|Level [0-9]+ bonus) \+[0-9]+/.test(text)||isEfficiencyShield;
  const isStreakIncrement=/^Streak \+1/.test(text);
  const isStreakMessage=/[0-9]+-streak/.test(text);
  message.classList.remove("info","score-pop","score-zero","streak-pop","quick-pop","shield-pop","accounting-pop","penalty-pop","final-pop","hold-score");
  message.classList.toggle("score-zero",isZero);
  message.classList.toggle("streak-pop",isStreakMessage);
  message.classList.toggle("quick-pop",/Speed bonus|^Efficiency \+(?!1)[0-9]+/.test(text));
  message.classList.toggle("accounting-pop",/^Solved \+[0-9]+$/.test(text));
  message.classList.toggle("penalty-pop",/^Hints? -[0-9]+$/.test(text));
  message.classList.toggle("shield-pop",isShieldReward||isStreakIncrement);
  message.classList.toggle("final-pop",isFinal&&!isStreakMessage);
  message.textContent=text;
  void message.offsetWidth;
  message.classList.add("score-pop");
}

function queueRewardAnimations(){
  clearBonusTimers();
  const messages=[...lastAccountingMessages,...lastBonusMessages];
  const now=Date.now();
  if(messages.length){
    const finalText=messages[messages.length-1];
    const finalDuration=/[0-9]+-streak/.test(finalText)?STREAK_POP_MS:FINAL_POP_MS;
    solvedToggleReadyAt=now+(messages.length-1)*1250+finalDuration+150;
  }else{
    solvedToggleReadyAt=now+SOLVED_TOGGLE_DELAY_MS;
  }
  messages.forEach((text,i)=>{
    bonusTimerIds.push(setTimeout(()=>{
      applyDisplayedReward(text);
      popMessage(text,text==="+0",i===messages.length-1);
      if(/[0-9]+-streak/.test(text))showStreakCelebration();
      else if(/Speed bonus/.test(text)||/^Efficiency \+(?!1)[0-9]+/.test(text))showStarBurst();
      if(/^(?:Shield|Level [0-9]+ bonus) \+[0-9]+/.test(text)||/^Efficiency \+1(?:\s|$)/.test(text))showShieldBurst();
    },i*1250));
  });
}

function noteInteraction(){interactionCount++;returnedToStartNoticeShown=false;blockedNoticeShown=false;clearReturnedToStartTimer();clearSingleStartWordTimer();clearNoticeTimer();if(message.classList.contains("info")&&(message.dataset.infoType==="returned-start"||message.dataset.infoType==="blocked-proper"||message.dataset.infoType==="single-start-word"))clearInfoMessage()}
function maybeShowReturnedToStartNotice(){clearReturnedToStartTimer();if(solved||interactionCount<3||returnedToStartNoticeShown||!isShowingStartingWords())return;returnedToStartTimer=setTimeout(()=>{if(!solved&&!returnedToStartNoticeShown&&isShowingStartingWords()){returnedToStartNoticeShown=true;showInfoMessage("These were the start words","returned-start")}},1500)}
function maybeShowSingleStartWordNotice(){clearSingleStartWordTimer();if(solved||isSolved()||isShowingStartingWords()||isBlockedProperNounSolution())return;const word=getSingleStartWordMatch();if(!word)return;singleStartWordTimer=setTimeout(()=>{const wordNow=getSingleStartWordMatch();if(!solved&&!isSolved()&&!isShowingStartingWords()&&!isBlockedProperNounSolution()&&wordNow)showInfoMessage(`${wordNow.toUpperCase()} was a start word`,"single-start-word")},1500)}
function maybeShowBlockedProperNounNotice(){clearNoticeTimer();if(solved||blockedNoticeShown||!isBlockedProperNounSolution())return;noticeTimer=setTimeout(()=>{if(!solved&&!blockedNoticeShown&&isBlockedProperNounSolution()){blockedNoticeShown=true;showInfoMessage("Proper nouns not allowed","blocked-proper")}},1500)}
function showInfoMessage(text,type="info"){if(infoMessageTimer)clearTimeout(infoMessageTimer);message.classList.remove("score-pop","score-zero","quick-pop","streak-pop","shield-pop","final-pop","hold-score","info");message.textContent=text;message.dataset.infoType=type;void message.offsetWidth;message.classList.add("info");infoMessageTimer=setTimeout(()=>{message.classList.remove("info");message.dataset.infoType="";if(!solved)message.textContent="";infoMessageTimer=null},4000)}
function showStartingWords(){if(solved||isShowingStartingWords())return;if(message.classList.contains("info")&&message.dataset.infoType==="starters"){clearInfoMessage();return}const p=currentPuzzle();showInfoMessage(`Started as: ${p.word1.toUpperCase()} / ${p.word2.toUpperCase()}`,"starters")}
function showSolvedStartPreview(){if(!solved||previewingStartWords)return;previewingStartWords=true;clearInfoMessage(false);message.classList.remove("info","score-pop","score-zero","quick-pop","streak-pop","shield-pop","final-pop");message.classList.add("hold-score");message.textContent="These were the start words";render()}
function hideSolvedStartPreview(){if(!previewingStartWords)return;previewingStartWords=false;message.classList.remove("score-pop","score-zero","quick-pop","streak-pop","shield-pop","accounting-pop","penalty-pop","final-pop","hold-score");message.textContent="";render()}
function toggleSolvedStartPreview(){if(!solved)return;previewingStartWords?hideSolvedStartPreview():showSolvedStartPreview()}

function handlePointerDown(e,id){if(solved||(e.button!==undefined&&e.button!==0))return;const t=tiles.find(x=>x.id===id);if(!t||t.locked)return;const r=e.currentTarget.getBoundingClientRect();dragState={tileId:id,pointerId:e.pointerId,startX:e.clientX,startY:e.clientY,x:e.clientX,y:e.clientY,lastX:e.clientX,hasDragged:false,startOrder:tiles.map(t=>t.id).join("|"),width:r.width,height:r.height,tileSnapshot:{...t}};e.currentTarget.setPointerCapture(e.pointerId);document.addEventListener("pointermove",handlePointerMove);document.addEventListener("pointerup",handlePointerUp);document.addEventListener("pointercancel",handlePointerCancel)}
function handlePointerMove(e){if(!dragState||e.pointerId!==dragState.pointerId)return;dragState.x=e.clientX;dragState.y=e.clientY;const dx=e.clientX-dragState.startX,dy=e.clientY-dragState.startY;if(!dragState.hasDragged&&Math.hypot(dx,dy)>7){dragState.hasDragged=true;createDragProxy(dragState.tileSnapshot,dragState.x,dragState.y,dragState.width,dragState.height);render()}if(dragState.hasDragged){moveDragProxy(dragState.x,dragState.y);liveReorderFromX(e.clientX,dragState.tileId)}}
function handlePointerUp(e){if(!dragState||e.pointerId!==dragState.pointerId)return;const s=dragState;cleanupPointerListeners();if(!s.hasDragged){const t=tiles.find(x=>x.id===s.tileId);if(t){t.flipAnim=t.flipped?"anim-flip-up":"anim-flip-down";t.flipped=!t.flipped;recordMove();noteInteraction();dragState=null;clearDragProxy();render();setTimeout(()=>{t.flipAnim="";maybeShowReturnedToStartNotice();maybeShowBlockedProperNounNotice();maybeShowSingleStartWordNotice();checkSolved()},360);return}}if(s.hasDragged&&s.startOrder!==tiles.map(t=>t.id).join("|")){recordMove();noteInteraction();}dragState=null;clearDragProxy();render();maybeShowReturnedToStartNotice();maybeShowBlockedProperNounNotice();maybeShowSingleStartWordNotice();checkSolved()}

function liveReorderFromX(x,id){const dragged=tiles.find(t=>t.id===id);if(!dragged||dragged.locked||!dragState)return;const others=tiles.filter(t=>!t.locked&&t.id!==id),els=[...board.querySelectorAll(".tile-wrap")].filter(el=>el.dataset.id!==id&&el.dataset.locked!=="1");let insertAt=tiles.filter(t=>!t.locked).findIndex(t=>t.id===id);if(x>dragState.lastX){for(let i=0;i<els.length;i++){const r=els[i].getBoundingClientRect();if(x>r.left+r.width*.33)insertAt=i+1}}else if(x<dragState.lastX){for(let i=els.length-1;i>=0;i--){const r=els[i].getBoundingClientRect();if(x<r.right-r.width*.33)insertAt=i}}insertAt=clamp(insertAt,0,others.length);const next=[...others];next.splice(insertAt,0,dragged);const rebuilt=rebuildWithLockedTiles(next);if(!sameOrder(rebuilt,tiles)){tiles=rebuilt;render();moveDragProxy(dragState.x,dragState.y)}dragState.lastX=x}

function rebuildWithLockedTiles(unlocked){const res=Array(tiles.length).fill(null);tiles.forEach(t=>{if(t.locked)res[t.targetIndex]=t});let c=0;for(let i=0;i<res.length;i++)if(!res[i])res[i]=unlocked[c++];return res}
function createDragProxy(t,x,y,w,h){clearDragProxy();const p=document.createElement("div");p.id="dragProxy";p.className="drag-proxy";if(t.flipped)p.classList.add("flipped");p.style.width=`${w}px`;p.style.height=`${h}px`;p.innerHTML=makeTileHTML(t);document.body.appendChild(p);moveDragProxy(x,y)}

function clearDragProxy(){$("dragProxy")?.remove()}

function applyOneHint({silent=false}={}){while(hintCursor<hintOrder.length){const id=hintOrder[hintCursor++],t=tiles.find(x=>x.id===id);if(!t||t.locked)continue;const first=hintsUsed===0;if(!silent&&first&&!shieldUsedThisLevel&&shields>0){shields--;displayedShields=shields;shieldUsedThisLevel=true;showInfoMessage("🛡️ Streak shield used","shield-used");updateFooterDisplay()}t.locked=true;if(first){if(t.top!==t.bottom)hintOrientationInverted=t.flipped!==t.targetFlipped}else if(t.top!==t.bottom){if(hintOrientationInverted===null)hintOrientationInverted=t.flipped!==t.targetFlipped;t.flipped=t.targetFlipped!==hintOrientationInverted}t.flipAnim="";hintsUsed++;if(!silent)noteInteraction();tiles=rebuildWithLockedTiles(tiles.filter(t=>!t.locked));forceNonSolvedStateIfNeeded();return true}return false}

function useHint(){if(solved)return;stopAutoHintTimer();if(applyOneHint()){render();checkSolved();saveGameState()}else render();if(!solved)startAutoHintTimer()}

function setHintFill(pct){hintBtn.style.setProperty("--hint-fill",`${clamp(pct,0,100)}%`)}
function clearAutoHintTimers(){if(autoHintDelayTimer)clearTimeout(autoHintDelayTimer);if(autoHintFrame)cancelAnimationFrame(autoHintFrame);autoHintDelayTimer=null;autoHintFrame=null}
function stopAutoHintTimer(){clearAutoHintTimers();autoHintDelayStartedAt=null;autoHintDelayRemainingMs=null;autoHintFillStart=null;autoHintFillElapsedMs=0;autoHintFilling=false;setHintFill(0)}
function startAutoHintTimer(delayMs=null){
  stopAutoHintTimer();
  if(solved||hintBtn.disabled||document.hidden)return;
  autoHintDelayRemainingMs=delayMs??getAutoHintDelayMs();
  if(autoHintDelayRemainingMs===null||autoHintDelayRemainingMs===undefined)return;
  autoHintDelayStartedAt=performance.now();

function beginAutoHintFill(){clearAutoHintTimers();if(solved||hintBtn.disabled||document.hidden)return;autoHintFilling=true;autoHintFillStart=performance.now()-autoHintFillElapsedMs;const step=now=>{if(document.hidden)return;autoHintFillElapsedMs=now-autoHintFillStart;const pct=(autoHintFillElapsedMs/AUTO_HINT_FILL_MS)*100;setHintFill(pct);if(pct>=100)useHint();else autoHintFrame=requestAnimationFrame(step)};autoHintFrame=requestAnimationFrame(step)}

function clearBonusTimers(){bonusTimerIds.forEach(id=>clearTimeout(id));bonusTimerIds=[]}
function clearReturnedToStartTimer(){if(returnedToStartTimer){clearTimeout(returnedToStartTimer);returnedToStartTimer=null}}

status.addEventListener("click",e=>{if(e.target&&e.target.id==="restartLink"){e.preventDefault();resetGame(0);return}toggleFooterInfo()});

window.addEventListener("orientationchange",()=>setTimeout(()=>{message.classList.remove("score-pop","score-zero");if(!message.classList.contains("info"))message.textContent=""},80));

function initGame(){const saved=loadSavedState();if(window.__jumpLevel!==undefined&&window.__jumpLevel!==null){resetGame(window.__jumpLevel-1);return}if(saved){if(Number.isInteger(saved.puzzleIndex))puzzleIndex=clamp(saved.puzzleIndex,0,puzzles.length-1);if(typeof saved.totalScore==="number"&&Number.isFinite(saved.totalScore))totalScore=Math.max(0,saved.totalScore);displayedTotalScore=totalScore;if(Number.isInteger(saved.noHintStreak))noHintStreak=Math.max(0,saved.noHintStreak);displayedNoHintStreak=noHintStreak;if(Number.isInteger(saved.shields))shields=clamp(saved.shields,0,MAX_SHIELDS);displayedShields=shields;shieldUsedThisLevel=!!saved.shieldUsedThisLevel}setupPuzzle({restoreHints:saved&&Number.isInteger(saved.hintsUsed)?Math.max(0,saved.hintsUsed):0,restoreMovesUsed:saved&&Number.isInteger(saved.movesUsed)?Math.max(0,saved.movesUsed):0,restoreSolved:!!(saved&&saved.solved),restoreSolvedAnswerInverted:!!(saved&&saved.solvedAnswerInverted),restoreCompletedWithHints:!!(saved&&saved.completedWithHints),restoreAwarded:!!(saved&&saved.puzzleAwarded),restoreShieldUsedThisLevel:!!(saved&&saved.shieldUsedThisLevel),restoreLastScore:saved&&typeof saved.lastPuzzleScore==="number"?saved.lastPuzzleScore:null,restoreStartTime:saved&&typeof saved.puzzleStartTime==="number"?saved.puzzleStartTime:Date.now(),restoreAutoHintFilling:!!(saved&&saved.autoHintFilling),restoreAutoHintDelayRemainingMs:saved&&typeof saved.autoHintDelayRemainingMs==="number"?saved.autoHintDelayRemainingMs:null,restoreAutoHintFillElapsedMs:saved&&typeof saved.autoHintFillElapsedMs==="number"?saved.autoHintFillElapsedMs:0})}
initGame();
