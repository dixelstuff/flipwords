.daily-section-title{margin:14px 0 8px;color:var(--ink);font-size:15px;font-weight:850;letter-spacing:.01em}.daily-section-meta{color:var(--muted);font-weight:400}.daily-section-title:first-of-type{margin-top:4px}.daily-today-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0 6px}.daily-overall-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:8px 0 4px}.daily-stat-box.primary{padding:14px 10px}.daily-stat-box.primary .daily-stat-emoji{font-size:18px;margin-bottom:2px}.daily-stat-box.primary .daily-stat-value{font-size:28px}.daily-stat-box.compact{padding:9px 8px}.daily-stat-box.compact .daily-stat-emoji{font-size:16px;margin-bottom:1px}.daily-stat-box.compact .daily-stat-value{font-size:20px}.controls.daily-complete-controls .action-slot{display:block}.hint.daily-share-button{color:var(--ink);background:var(--soft);border:0;box-shadow:none}.hint.daily-share-button::before{display:none}.start-words.daily-end-stats{color:#fff;background:var(--success);box-shadow:0 3px 10px rgba(48,164,108,.18)}.hint.daily-hint-unavailable{color:var(--ink);background:var(--soft);box-shadow:none;opacity:.46}.hint.daily-hint-unavailable::before{display:none}.subtitle.daily-complete-title{font-size:clamp(25px,3.2vw,34px);font-weight:850;line-height:1;color:var(--success);align-items:center;flex-direction:column;gap:2px;padding-top:2px;letter-spacing:-.02em}.daily-complete-moves{font-size:clamp(20px,2.6vw,27px);font-weight:700;color:var(--muted);letter-spacing:0}.subtitle.daily-complete-animate{animation:daily-complete-pop .95s cubic-bezier(.18,.9,.22,1) both}.subtitle.intro-copy{font-size:clamp(18px,2.05vw,21.5px);line-height:1.34}.daily-countdown,.daily-play-time{font-variant-numeric:tabular-nums;letter-spacing:.01em}.subtitle .daily-play-time{font-size:clamp(20px,2.7vw,28px);font-weight:720;color:var(--muted)}.daily-countdown strong{font-weight:850;color:var(--ink)}.daily-share-text{width:100%;min-height:190px;border:1px solid rgba(37,31,52,.14);border-r <body>
<main class="game">
<h1 class="title">FlipWords</h1>
<p id="subtitle" class="subtitle intro-copy">Make two new words by flipping and moving the tiles to solve.</p>
<section class="board-shell" aria-label="Puzzle board"><div id="board" class="board"></div></section>
<div class="feedback-area"><div id="message" class="message" aria-live="polite"></div><div id="starBurst" class="star-burst" aria-hidden="true"></div></div>
<div class="controls"><button id="hintBtn" class="hint" type="button"><span>Hint</span></button><span class="action-slot"><button id="startWordsBtn" class="start-words" type="button">Starters</button><button id="nextBtn" class="next" type="button">Next</button></span></div>
<div id="status" class="status"></div><div id="scoreLine" class="score-line"></div>
<button id="statsToggle" class="stats-toggle" type="button">View details</button>
<div id="endMessage" class="end-message"></div>
<div id="statsPanel" class="stats-panel"></div>
<div id="modeToggle" class="mode-toggle" aria-label="Mode"><button id="dailyModeBtn" type="button">daily</button><button id="gameModeBtn" type="button">game</button></div>
</main>
<script>

function computeCanonicalMapping(p,tileIds){

      let flipped=null;
      if(tile.top===target.top&&tile.bottom===target.bottom)flipped=false;

function applyDisplayedReward(text){
  const add=text.match(/^\+([0-9]+)$/)||text.match(/^Solved \+([0-9]+)$/)||text.match(/Speed bonus \+([0-9]+)/)||text.match(/[0-9]+-streak \+([0-9]+)/)||text.match(/^Efficiency \+([0-9]+)/);
  if(add&&!/^Efficiency \+1(?:\s|$)/.test(text))displayedTotalScore+=Number(add[1]);
  if(/^Streak \+1/.test(text)||/[0-9]+-streak/.test(text))displayedNoHintStreak=Math.min(noHintStreak,displayedNoHintStreak+1);
  const subtract=text.match(/^Hints? -([0-9]+)$/);
  if(subtract)displayedTotalScore=Math.max(0,displayedTotalScore-Number(subtract[1]));
  const shieldMatch=text.match(/^(?:Shield|Efficiency) \+([0-9]+)/);
  if(shieldMatch&&/^Efficiency \+1 .*🛡️/.test(text))displayedShields=Math.min(MAX_SHIELDS,displayedShields+1);
  else if(shieldMatch&&!text.startsWith("Efficiency"))displayedShields=Math.min(MAX_SHIELDS,displayedShields+Number(shieldMatch[1]));
  updateFooterDisplay();
}
function popMessage(text,isZero=false,isFinal=false){
  const isEfficiencyShield=/^Efficiency \+1(?:\s|$)/.test(text);
  const isShieldReward=/^(?:Shield) \+[0-9]+/.test(text)||isEfficiencyShield;
  const isStreakIncrement=/^Streak \+1/.test(text);
  const isStreakMessage=/[0-9]+-streak/.test(text);
  message.classList.remove("info","score-pop","score-zero","streak-pop","quick-pop","shield-pop","accounting-pop","penalty-pop","final-pop","hold-score");
  message.classList.toggle("score-zero",isZero);
  message.classList.toggle("streak-pop",isStreakMessage);
  message.classList.toggle("quick-pop",/Speed bonus|^Efficiency [+](?!1(?: |$))[0-9]+/.test(text));
  message.classList.toggle("accounting-pop",/^Solved \+[0-9]+$/.test(text));
  message.classList.toggle("penalty-pop",/^Hints? -[0-9]+$/.test(text));
  message.classList.toggle("shield-pop",isShieldReward||isStreakIncrement);
  message.classList.toggle("final-pop",isFinal&&!isStreakMessage);
  message.textContent=text;
  void message.offsetWidth;
  message.classList.add("score-pop");
}
