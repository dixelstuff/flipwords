function fitBoardToViewport(){
  if(!board||!boardShell)return;
  cancelAnimationFrame(fitBoardRAF);
  fitBoardRAF=requestAnimationFrame(()=>{
    board.style.removeProperty("--grid-scale");
    // Read the class/media scale first, then shrink from that baseline only if required.
    const baseScale=parseFloat(getComputedStyle(board).getPropertyValue("--grid-scale"))||1;
    const available=Math.max(0,Math.min(boardShell.clientWidth-2,document.documentElement.clientWidth-28));
    // Force a layout read at the current class/media scale.
    const currentWidth=board.getBoundingClientRect().width||board.scrollWidth;
    if(!available||!currentWidth){board.style.setProperty("--grid-scale",String(baseScale));return}
    let target=baseScale;
    if(currentWidth>available){
      target=Math.max(0.38,Math.min(baseScale,baseScale*(available/currentWidth)*0.995));
    }
    board.style.setProperty("--grid-scale",target.toFixed(4));
    const adjustedWidth=board.getBoundingClientRect().width||board.scrollWidth;
    if(adjustedWidth>available+1){
      const target2=Math.max(0.36,target*(available/adjustedWidth)*0.995);
      board.style.setProperty("--grid-scale",target2.toFixed(4));
    }
  });
}

function formatScore(n){return Number(n).toLocaleString("en-AU")}
function formatTime(ms){return `${(ms/1000).toFixed(1)}s`}
function medianTime(times){
  if(!Array.isArray(times)||!times.length)return null;
  const sorted=[...times].sort((a,b)=>a-b);
  const mid=Math.floor(sorted.length/2);
  return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2;
}

function getClueAwardClassFromText(text){
  const t=String(text||"");
  if(/Perfect|perfect[- ]streak|New best streak|NEW BEST STREAK/.test(t))return "award-perfect";
  if(/Great/.test(t))return "award-great";
  if(/Good/.test(t))return "award-good";
  if(/Rough|Clunky|Revealed/.test(t))return "award-clunky";
  return "";
}
function applyDisplayedReward(text){
  const add=text.match(/^\+([0-9]+)$/)||text.match(/^Solved \+([0-9]+)$/)||text.match(/(?:🌟 |💎 |✨ |🪨 )?(?:Perfect|Great|Good|Rough|Clunky)(?: solve)?!? .*\+([0-9]+)/)||text.match(/Perfect[- ]streak [0-9]+🔥 \+([0-9]+)/)||text.match(/(?:🔥 )?New best streak! \+([0-9]+)/i)||text.match(/(?:Broke )?💯 [0-9]+(?: in a row|-in-a-row)! \+([0-9]+)/)||text.match(/Speed bonus \+([0-9]+)/)||text.match(/[0-9]+-streak \+([0-9]+)/)||text.match(/^Efficiency \+([0-9]+)/);
  if(add&&!isNewMode()&&!/^Efficiency \+1(?:\s|$)/.test(text))displayedTotalScore+=Number(add[1]);
  if(/^Streak \+1/.test(text)||/[0-9]+-streak/.test(text))displayedNoHintStreak=Math.min(noHintStreak,displayedNoHintStreak+1);
  const subtract=text.match(/^Hints? -([0-9]+)$/);
  if(subtract)displayedTotalScore=Math.max(0,displayedTotalScore-Number(subtract[1]));
  const shieldMatch=text.match(/^(?:Shield|Efficiency) \+([0-9]+)/);
  if(shieldMatch&&/^Efficiency \+1 .*🛡️/.test(text))displayedShields=Math.min(MAX_SHIELDS,displayedShields+1);
  else if(shieldMatch&&!text.startsWith("Efficiency"))displayedShields=Math.min(MAX_SHIELDS,displayedShields+Number(shieldMatch[1]));
  updateFooterDisplay();
}
function popMessage(text,isZero=false,isFinal=false){
  const isEfficiencyShield=/^Efficiency \+1(?:\s|$)/.test(text);
  const isShieldReward=/^(?:Shield) \+[0-9]+/.test(text)||isEfficiencyShield;
  const isStreakIncrement=/^Streak \+1/.test(text);
  const isStreakMessage=/[0-9]+-streak/.test(text)||/^Perfect[- ]streak [0-9]+🔥/.test(text)||/^(?:🔥 )?New best streak!/i.test(text)||/^(?:Broke )?💯 [0-9]+(?: in a row|-in-a-row)!/i.test(text);
  if(isNewMode()&&solved){
    setGameSolvedSubtitleText(text,true);
    message.textContent="";
    message.classList.remove("info","score-pop","score-zero","streak-pop","quick-pop","shield-pop","accounting-pop","penalty-pop","final-pop","hold-score","hold-fade","clue-static","solved-award-persist","clue-award-pop","award-perfect","award-great","award-good","award-clunky");
    return;
  }
  message.classList.remove("info","score-pop","score-zero","streak-pop","quick-pop","shield-pop","accounting-pop","penalty-pop","final-pop","hold-score","solved-award-persist","clue-award-pop","award-perfect","award-great","award-good","award-clunky");
  message.classList.toggle("score-zero",isZero||/^Revealed \+0$/.test(text));
  message.classList.toggle("streak-pop",isStreakMessage);
  message.classList.toggle("quick-pop",/Speed bonus|^Efficiency [+](?!1(?: |$))[0-9]+/.test(text));
  message.classList.toggle("accounting-pop",/^Solved \+[0-9]+$/.test(text));
  message.classList.toggle("penalty-pop",/^Hints? -[0-9]+$/.test(text));
  message.classList.toggle("shield-pop",isShieldReward||isStreakIncrement);
  message.classList.toggle("final-pop",isFinal&&!isStreakMessage&&!isNewMode());
  message.classList.toggle("solved-award-persist",false);
  message.style.animationDuration=isNewMode()?"":"";
  message.classList.toggle("clue-award-pop",isNewMode());
  if(isNewMode()){
    const awardClass=getClueAwardClassFromText(text);
    if(awardClass)message.classList.add(awardClass);
  }
  message.textContent=text;
  void message.offsetWidth;
  message.classList.add("score-pop");
}

function currentOrientationScore(inverted=false){
  const p=currentPuzzle(),w=currentWords();
  const topTarget=inverted?p.answer2:p.answer1,bottomTarget=inverted?p.answer1:p.answer2;
  let score=0;
  for(let i=0;i<topTarget.length;i++){
    if(w.top[i]===topTarget[i])score++;
    if(w.bottom[i]===bottomTarget[i])score++;
  }
  return score;
}
function chooseClosestAnswerOrientation(){
  const normal=currentOrientationScore(false),inverted=currentOrientationScore(true);
  if(inverted>normal)return true;
  if(normal>inverted)return false;
  const locked=lockedStartTileOrientationInverted();
  return locked===null?false:locked;
}
